{% extends 'layout.html' %}
{% block title %}
    POSTS
{% endblock %}

{% block content %}
    <h1>Welcome to My Django Project</h1>
    <p>This is the post list page.</p>
    <section>
        {% for post in posts %}
            <article>
                <h2>{{ post.title }}</h2>
                <p>{{ post.body }}</p>
                <a href="{% url 'posts:posts_page' slug=post.slug %}">Read more</a>
            </article>
        {% endfor %}
    </section>
{% endblock %}
